
<script>
// ═══════════════════════════════════════════════════════
// AEGIS Cockpit — UI-01
// Utilitarian. Dense. Task Manager aesthetic.
// ═══════════════════════════════════════════════════════

// ── State ────────────────────────────────────────────────
const HISTORY = 60;
const history = {
  cpu: Array(HISTORY).fill(0), mem: Array(HISTORY).fill(0),
  gpu: Array(HISTORY).fill(0), diskRead: Array(HISTORY).fill(0),
  diskWrite: Array(HISTORY).fill(0), netRecv: Array(HISTORY).fill(0),
  netSend: Array(HISTORY).fill(0),
};
let metrics = null;
let intelligence = {};
let procSort = { col: 'cpu', dir: 'desc' };
let procView = 'flat';
let procFilter = '';
let eventCount = 0;
let sniperActions = [];
let treeExpanded = new Set();

// ── Sidebar navigation ───────────────────────────────────
document.querySelectorAll('.sb-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    const pane = el.dataset.pane;
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('pane-' + pane);
    if (target) target.classList.add('active');
  });
});

// ── Theme toggle ─────────────────────────────────────────
const btnTheme = document.getElementById('btn-theme');
btnTheme.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  btnTheme.textContent = isDark ? 'Dark' : 'Light';
});

// ── Process table sort ───────────────────────────────────
document.querySelectorAll('#proc-table th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (procSort.col === col) {
      procSort.dir = procSort.dir === 'desc' ? 'asc' : 'desc';
    } else {
      procSort.col = col;
      procSort.dir = col === 'name' ? 'asc' : 'desc';
    }
    document.querySelectorAll('#proc-table th').forEach(t => t.classList.remove('sa','sd'));
    th.classList.add(procSort.dir === 'asc' ? 'sa' : 'sd');
    renderProcesses();
  });
});

// ── Process filter ───────────────────────────────────────
document.getElementById('proc-search').addEventListener('input', e => {
  procFilter = e.target.value.toLowerCase();
  renderProcesses();
});

// ── View toggle ──────────────────────────────────────────
document.getElementById('btn-flat').addEventListener('click', () => {
  procView = 'flat';
  document.getElementById('btn-flat').classList.add('active');
  document.getElementById('btn-tree').classList.remove('active');
  renderProcesses();
});
document.getElementById('btn-tree').addEventListener('click', () => {
  procView = 'tree';
  document.getElementById('btn-tree').classList.add('active');
  document.getElementById('btn-flat').classList.remove('active');
  renderProcesses();
});

// ── Format helpers ────────────────────────────────────────
const fmt = {
  pct: v => (v ?? 0).toFixed(1) + '%',
  mb: v => (v >= 1024 ? (v/1024).toFixed(1) + ' GB' : Math.round(v) + ' MB'),
  bytes: v => {
    if (!v) return '0 B/s';
    if (v >= 1073741824) return (v/1073741824).toFixed(1) + ' GB/s';
    if (v >= 1048576) return (v/1048576).toFixed(1) + ' MB/s';
    if (v >= 1024) return (v/1024).toFixed(0) + ' KB/s';
    return Math.round(v) + ' B/s';
  },
  uptime: s => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
    return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
  },
  time: () => new Date().toLocaleTimeString('en-US', {hour12:false}),
};

// ── Canvas graph ─────────────────────────────────────────
function drawGraph(canvasId, datasets) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const style = getComputedStyle(document.documentElement);
  const bg = style.getPropertyValue('--bg-tertiary').trim();
  const borderColor = style.getPropertyValue('--border').trim();

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 0.5;
  [25,50,75].forEach(pct => {
    const y = H - (pct/100) * H;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });

  // Data lines
  datasets.forEach(({ data, color, fill }) => {
    if (!data || data.length < 2) return;
    const max = Math.max(...data, 1);
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = (i / (data.length-1)) * W;
      const y = H - (v / max) * H * 0.95;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    if (fill) {
      const lastX = W, lastY = H - (data[data.length-1] / max) * H * 0.95;
      ctx.lineTo(lastX, H); ctx.lineTo(0, H);
      ctx.closePath();
      ctx.fillStyle = color + '22';
      ctx.fill();
      ctx.beginPath();
      data.forEach((v, i) => {
        const x = (i / (data.length-1)) * W;
        const y = H - (v / max) * H * 0.95;
        i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      });
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Intervention markers
  if (window.sniperMarkers && canvasId.startsWith('graph-')) {
    // future: draw vertical lines at sniper action timestamps
  }
}

// ── Sparkline ────────────────────────────────────────────
function drawSpark(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const max = Math.max(...data, 1);
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length-1)) * W;
    const y = H - (v / max) * H * 0.9;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ── Top process rows ─────────────────────────────────────
function renderTopList(containerId, procs, valueKey, formatFn, color) {
  const el = document.getElementById(containerId);
  if (!el || !procs) return;
  const maxVal = Math.max(...procs.map(p => p[valueKey] || 0), 1);
  el.innerHTML = procs.slice(0,8).map(p => {
    const val = p[valueKey] || 0;
    const barW = Math.round((val / maxVal) * 80);
    return `<div class="kv-row" style="align-items:center;gap:8px;">
      <span style="flex:1;font-family:var(--mono);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span>
      <div style="width:80px;height:4px;background:var(--bar-track);flex-shrink:0;">
        <div style="width:${barW}px;height:100%;background:${color};"></div>
      </div>
      <span style="width:60px;text-align:right;font-family:var(--mono);font-size:11px;flex-shrink:0;">${formatFn(val)}</span>
      <button class="act-btn" onclick="throttleProc(${p.pid})">T</button>
      <button class="act-btn kill" onclick="killProc(${p.pid})">K</button>
    </div>`;
  }).join('');
}

// ── Process table ─────────────────────────────────────────
function renderProcesses() {
  if (!metrics || !metrics.processes) return;
  let procs = [...metrics.processes];

  // Filter
  if (procFilter) {
    procs = procs.filter(p => p.name.toLowerCase().includes(procFilter));
  }

  // Sort
  procs.sort((a, b) => {
    let av = a[procSort.col] ?? 0, bv = b[procSort.col] ?? 0;
    if (procSort.col === 'name') { av = a.name; bv = b.name; }
    if (procSort.col === 'mem') { av = a.memory_mb; bv = b.memory_mb; }
    if (procSort.col === 'cpu') { av = a.cpu_percent; bv = b.cpu_percent; }
    if (procSort.col === 'pid') { av = a.pid; bv = b.pid; }
    if (typeof av === 'string') return procSort.dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return procSort.dir === 'asc' ? av - bv : bv - av;
  });

  document.getElementById('proc-count').textContent = procs.length + ' processes';

  const maxCpu = Math.max(...procs.map(p => p.cpu_percent || 0), 1);
  const maxMem = Math.max(...procs.map(p => p.memory_mb || 0), 1);

  const rows = procs.map(p => {
    const cpuPct = ((p.cpu_percent || 0) / maxCpu * 100).toFixed(0);
    const memPct = ((p.memory_mb || 0) / maxMem * 100).toFixed(0);
    const cpuHot = (p.cpu_percent || 0) > 50 ? ' hot' : (p.cpu_percent || 0) > 20 ? '' : '';
    const status = p.status === 'running' ? '<span class="sdot ok"></span>' :
                   p.status === 'stopped' ? '<span class="sdot danger"></span>' :
                   '<span class="sdot idle"></span>';
    return `<tr>
      <td class="td-name" title="${p.name}">${p.name}</td>
      <td class="td-r">${p.pid}</td>
      <td class="bar-cell td-r${cpuHot}">
        <div class="bar-bg" style="width:${cpuPct}%;background:var(--cpu);"></div>
        ${fmt.pct(p.cpu_percent)}
      </td>
      <td class="bar-cell td-r">
        <div class="bar-bg" style="width:${memPct}%;background:var(--mem);"></div>
        ${fmt.mb(p.memory_mb)}
      </td>
      <td class="td-r">${p.disk_bytes_sec ? fmt.bytes(p.disk_bytes_sec) : '--'}</td>
      <td>${status}</td>
      <td><button class="act-btn" onclick="throttleProc(${p.pid})">T</button> <button class="act-btn kill" onclick="killProc(${p.pid})">K</button></td>
    </tr>`;
  }).join('');

  document.getElementById('proc-tbody').innerHTML = rows;
}

// ── Actions ───────────────────────────────────────────────
async function throttleProc(pid) {
  if (window.__TAURI__) {
    await window.__TAURI__.core.invoke('set_process_priority', { pid, priority: 'below_normal' });
    showToast('Throttled PID ' + pid, 'Priority set to below normal', 'warn');
  }
}
async function killProc(pid) {
  if (window.__TAURI__) {
    await window.__TAURI__.core.invoke('kill_process_cmd', { pid });
    showToast('Killed PID ' + pid, 'Process terminated', 'danger');
  }
}

// ── Toast ────────────────────────────────────────────────
function showToast(title, body, type) {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.innerHTML = `<div class="t-title">${title}</div><div class="t-body">${body}</div>`;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 200); }, 4000);
}

// ── Clock ────────────────────────────────────────────────
setInterval(() => { document.getElementById('sb-time').textContent = fmt.time(); }, 1000);
document.getElementById('sb-time').textContent = fmt.time();

// ── Main metrics handler ──────────────────────────────────
function handleMetrics(m) {
  metrics = m;
  const cpu = m.cpu?.percent ?? 0;
  const mem = m.memory?.percent ?? 0;

  // History
  history.cpu.push(cpu); history.cpu.shift();
  history.mem.push(mem); history.mem.shift();

  // Header
  document.getElementById('v-load').textContent = cpu.toFixed(0);
  document.getElementById('v-tier').textContent = cpu < 40 ? 'LOW' : cpu < 70 ? 'MED' : 'HIGH';

  // Sidebar values
  document.getElementById('sb-cpu').textContent = cpu.toFixed(0) + '%';
  document.getElementById('sb-mem').textContent = mem.toFixed(0) + '%';
  document.getElementById('sb-procs').textContent = m.processes?.length ?? '--';

  // Sparklines
  const cpuColor = getComputedStyle(document.documentElement).getPropertyValue('--cpu').trim();
  const memColor = getComputedStyle(document.documentElement).getPropertyValue('--mem').trim();
  drawSpark('spark-cpu', history.cpu, cpuColor);
  drawSpark('spark-mem', history.mem, memColor);

  // CPU pane
  document.getElementById('cpu-pct').textContent = fmt.pct(cpu);
  document.getElementById('cpu-util').textContent = fmt.pct(cpu);
  document.getElementById('cpu-freq').textContent = ((m.cpu?.frequency_mhz || 0)/1000).toFixed(1) + ' GHz · ' + (m.cpu?.core_count || '--') + ' cores';
  document.getElementById('cpu-procs').textContent = m.processes?.length ?? '--';
  document.getElementById('cpu-uptime').textContent = fmt.uptime(m.uptime_sec || 0);

  // Per-core bars
  if (m.cpu?.per_core) {
    const cores = document.getElementById('cpu-cores');
    cores.innerHTML = m.cpu.per_core.map((v, i) =>
      `<div style="text-align:center;">
        <div style="font-size:9px;color:var(--text-secondary);margin-bottom:2px;">C${i}</div>
        <div style="height:40px;background:var(--bar-track);position:relative;display:flex;align-items:flex-end;">
          <div style="width:100%;height:${v}%;background:var(--cpu);transition:height .4s;"></div>
        </div>
        <div style="font-size:9px;font-family:var(--mono);color:var(--text-primary);margin-top:2px;">${v.toFixed(0)}%</div>
      </div>`
    ).join('');
  }

  // CPU graph
  drawGraph('graph-cpu', [{ data: history.cpu, color: cpuColor, fill: true }]);

  // Top CPU processes
  if (m.processes) {
    const topCpu = [...m.processes].sort((a,b) => (b.cpu_percent||0)-(a.cpu_percent||0)).slice(0,8);
    renderTopList('cpu-top', topCpu, 'cpu_percent', v => v.toFixed(1)+'%', cpuColor);
  }

  // Memory pane
  const usedMb = m.memory?.used_mb ?? 0;
  const totalMb = m.memory?.total_mb ?? 0;
  const availMb = m.memory?.available_mb ?? 0;
  document.getElementById('mem-pct').textContent = fmt.pct(mem);
  document.getElementById('mem-pressure').textContent = fmt.pct(mem);
  document.getElementById('mem-used').textContent = fmt.mb(usedMb);
  document.getElementById('mem-avail').textContent = fmt.mb(availMb);
  document.getElementById('mem-total').textContent = fmt.mb(totalMb) + ' total';
  document.getElementById('mem-total2').textContent = fmt.mb(totalMb);
  document.getElementById('mem-bar').style.width = mem + '%';
  document.getElementById('mem-bar').className = 'hbar-fill' + (mem > 90 ? ' danger' : mem > 75 ? ' warn' : '');
  document.getElementById('mem-bar-mid').textContent = fmt.mb(usedMb);
  document.getElementById('mem-bar-max').textContent = fmt.mb(totalMb);

  // Memory graph
  drawGraph('graph-mem', [{ data: history.mem, color: memColor, fill: true }]);

  // Top memory
  if (m.processes) {
    const topMem = [...m.processes].sort((a,b) => (b.memory_mb||0)-(a.memory_mb||0)).slice(0,8);
    renderTopList('mem-top', topMem, 'memory_mb', v => fmt.mb(v), memColor);
  }

  // Disk
  if (m.disks?.length) {
    const diskD = m.disks.find(d => d.mount?.startsWith('D')) || m.disks[0];
    const diskC = m.disks.find(d => d.mount?.startsWith('C'));
    if (diskD) {
      const dRate = (diskD.read_bytes_sec + diskD.write_bytes_sec) / 1048576;
      history.diskRead.push(diskD.read_bytes_sec / 1048576); history.diskRead.shift();
      history.diskWrite.push(diskD.write_bytes_sec / 1048576); history.diskWrite.shift();
      document.getElementById('sb-disk').textContent = dRate.toFixed(1) + ' MB/s';
      document.getElementById('disk-d-rate').textContent = dRate.toFixed(1) + ' MB/s';
      document.getElementById('disk-d-space').textContent = fmt.mb(diskD.available_gb * 1024) + ' free';
      document.getElementById('disk-d-read').textContent = fmt.bytes(diskD.read_bytes_sec);
      document.getElementById('disk-d-write').textContent = fmt.bytes(diskD.write_bytes_sec);
      const diskRColor = getComputedStyle(document.documentElement).getPropertyValue('--disk-r').trim();
      const diskWColor = getComputedStyle(document.documentElement).getPropertyValue('--disk-w').trim();
      drawGraph('graph-disk', [
        { data: history.diskRead, color: diskRColor },
        { data: history.diskWrite, color: diskWColor },
      ]);
    }
    if (diskC) {
      const cRate = (diskC.read_bytes_sec + diskC.write_bytes_sec) / 1048576;
      document.getElementById('sb-disk-c').textContent = cRate.toFixed(1) + ' MB/s';
      document.getElementById('disk-c-rate').textContent = cRate.toFixed(1) + ' MB/s';
      document.getElementById('disk-c-read').textContent = fmt.bytes(diskC.read_bytes_sec);
      document.getElementById('disk-c-write').textContent = fmt.bytes(diskC.write_bytes_sec);
      const usedC = diskC.total_gb - diskC.available_gb;
      const usedPct = (usedC / diskC.total_gb) * 100;
      document.getElementById('disk-c-space').textContent = fmt.mb(diskC.available_gb * 1024) + ' free';
      document.getElementById('disk-c-bar').style.width = usedPct + '%';
      document.getElementById('disk-c-used-lbl').textContent = usedC.toFixed(1) + ' GB used';
      document.getElementById('disk-c-free-lbl').textContent = diskC.available_gb.toFixed(1) + ' GB free';
    }
  }

  // Network
  if (m.networks?.length) {
    const activeNets = m.networks.filter(n => n.received_bytes_sec > 0 || n.transmitted_bytes_sec > 0);
    const totalRecv = activeNets.reduce((s,n) => s + n.received_bytes_sec, 0);
    const totalSend = activeNets.reduce((s,n) => s + n.transmitted_bytes_sec, 0);
    history.netRecv.push(totalRecv / 1024); history.netRecv.shift();
    history.netSend.push(totalSend / 1024); history.netSend.shift();
    document.getElementById('sb-net').textContent = fmt.bytes(totalRecv + totalSend);
    document.getElementById('net-total').textContent = fmt.bytes(totalRecv + totalSend);
    document.getElementById('net-recv').textContent = fmt.bytes(totalRecv);
    document.getElementById('net-send').textContent = fmt.bytes(totalSend);
    const netRxColor = getComputedStyle(document.documentElement).getPropertyValue('--net-rx').trim();
    const netTxColor = getComputedStyle(document.documentElement).getPropertyValue('--net-tx').trim();
    drawGraph('graph-net', [
      { data: history.netRecv, color: netRxColor },
      { data: history.netSend, color: netTxColor },
    ]);
    document.getElementById('net-adapters').innerHTML = m.networks.map(n =>
      `<div class="kv-row">
        <span class="kv-k">${n.name.substring(0,30)}</span>
        <span class="kv-v">↓${fmt.bytes(n.received_bytes_sec)} ↑${fmt.bytes(n.transmitted_bytes_sec)}</span>
      </div>`
    ).join('');
  }

  // Status bar
  document.getElementById('sb-uptime').textContent = fmt.uptime(m.uptime_sec || 0);
  document.getElementById('sb-events').textContent = (++eventCount) + ' events';

  // Processes pane
  renderProcesses();
}

// ── Intelligence handler ──────────────────────────────────
function handleIntelligence(data) {
  intelligence = { ...intelligence, ...data };

  // Context
  if (data.context) {
    document.getElementById('v-ctx').textContent = data.context;
    document.getElementById('sb-ctx-short').textContent = data.context;
    document.getElementById('ctx-name').textContent = data.context;
  }
  if (data.confidence !== undefined) {
    document.getElementById('ctx-conf').textContent = (data.confidence * 100).toFixed(0) + '% confidence';
  }

  // Cognitive load → header
  if (data.score !== undefined) {
    document.getElementById('v-load').textContent = data.score;
    const tier = data.tier || (data.score < 40 ? 'LOW' : data.score < 70 ? 'MED' : 'HIGH');
    document.getElementById('v-tier').textContent = tier;
  }

  // Catalog
  if (data.catalog) {
    document.getElementById('cat-known').textContent = data.catalog.total ?? '--';
    document.getElementById('cat-unknown').textContent = data.catalog.unknown ?? '--';
    document.getElementById('cat-suspicious').textContent = data.catalog.suspicious ?? '--';
    document.getElementById('sb-cat-val').textContent = (data.catalog.unknown || 0) + ' unknown';
    const catDot = document.getElementById('sb-cat-dot');
    if ((data.catalog.suspicious || 0) > 0) catDot.className = 'sb-status danger';
    else if ((data.catalog.unknown || 0) > 0) catDot.className = 'sb-status warn';
    else catDot.className = 'sb-status ok';
  }

  // Confidence
  if (data.learning_confidence) {
    const score = data.learning_confidence.score || 0;
    document.getElementById('sb-conf').textContent = score + '%';
    document.getElementById('learn-score').textContent = score + '%';
    document.getElementById('learn-bar').style.width = score + '%';
    document.getElementById('learn-mode').textContent = data.learning_confidence.auto_mode_unlocked ? 'Auto mode' : 'Manual mode';
    document.getElementById('learn-stats').innerHTML = `
      <div class="kv-row"><span class="kv-k">Decisions</span><span class="kv-v">${data.learning_confidence.total_decisions ?? 0}</span></div>
      <div class="kv-row"><span class="kv-k">Until auto</span><span class="kv-v">${data.learning_confidence.decisions_until_auto ?? '--'}</span></div>`;
  }

  // Sniper watches
  if (data.active_watches !== undefined) {
    document.getElementById('sb-watches').textContent = data.active_watches + ' watching';
    document.getElementById('sniper-watches').textContent = data.active_watches;
    const sniperDot = document.getElementById('sb-sniper-dot');
    sniperDot.className = 'sb-status ' + (data.active_watches > 0 ? 'warn' : 'ok');
    const sbWatching = document.getElementById('sb-watching');
    sbWatching.textContent = data.active_watches > 0 ? 'Monitoring ' + data.active_watches + ' processes' : '';
  }
}

// ── Tauri IPC connection ──────────────────────────────────
async function connectTauri() {
  if (!window.__TAURI__) {
    setTimeout(connectTauri, 500);
    return;
  }

  // Status bar
  document.getElementById('sb-intel').textContent = 'Intelligence active';
  document.getElementById('sb-metrics').textContent = 'Metrics live';
  document.getElementById('sb-intel-dot').className = 'sb-dot ok';
  document.getElementById('sb-metrics-dot').className = 'sb-dot ok';

  // Listen for metrics
  window.__TAURI__.event.listen('metrics', e => {
    handleMetrics(e.payload);
  });

  // Listen for intelligence events
  window.__TAURI__.event.listen('intelligence', e => {
    handleIntelligence(e.payload);
  });

  // Sidecar events
  const sidecarEvents = ['context_changed','load_score_updated','confidence_updated',
    'sniper_action_requested','policies_updated','heartbeat','started'];
  sidecarEvents.forEach(evtName => {
    window.__TAURI__.event.listen(evtName, e => {
      const p = e.payload;
      if (evtName === 'context_changed') {
        document.getElementById('v-ctx').textContent = p.context || '--';
        document.getElementById('sb-ctx-short').textContent = p.context || '--';
        document.getElementById('ctx-name').textContent = p.context || '--';
        document.getElementById('ctx-conf').textContent = ((p.confidence || 0)*100).toFixed(0) + '% confidence';
      }
      if (evtName === 'load_score_updated') {
        document.getElementById('v-load').textContent = p.score;
        document.getElementById('v-tier').textContent = (p.tier || 'LOW').toUpperCase();
      }
      if (evtName === 'confidence_updated') {
        document.getElementById('sb-conf').textContent = p.score + '%';
        document.getElementById('learn-score').textContent = p.score + '%';
        document.getElementById('learn-bar').style.width = p.score + '%';
      }
      if (evtName === 'sniper_action_requested') {
        sniperActions.unshift(p);
        if (sniperActions.length > 20) sniperActions.pop();
        renderSniperActions();
        showToast('AEGIS ' + p.action + ' ' + p.name, p.reason?.substring(0,80) || '', 'warn');
      }
    });
  });

  // Initial data pull
  try {
    const m = await window.__TAURI__.core.invoke('get_latest_metrics');
    if (m) handleMetrics(m);
    const intel = await window.__TAURI__.core.invoke('get_intelligence');
    if (intel) handleIntelligence(typeof intel === 'string' ? JSON.parse(intel) : intel);
  } catch(e) { /* not ready yet */ }
}

function renderSniperActions() {
  const el = document.getElementById('sniper-actions');
  if (!sniperActions.length) {
    el.innerHTML = '<span style="color:var(--text-secondary);font-size:11px;">Observing — no actions yet</span>';
    return;
  }
  el.innerHTML = sniperActions.map(a =>
    `<div class="kv-row">
      <span class="kv-k" style="font-family:var(--mono);">${a.name}</span>
      <span style="color:var(--status-warn);font-size:10px;font-family:var(--mono);">${a.action}</span>
    </div>`
  ).join('');
}

connectTauri();
</script>
</body>
</html>
