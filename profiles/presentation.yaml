profile:
  name: presentation
  display_name: "Presentation"
  description: "OBS and Chrome elevated for smooth streaming and screen sharing. Balanced power for consistency."
  icon: presentation
  color: "#a855f7"

  power_plan: balanced

  auto_detect:
    triggers:
      - process: obs64.exe
      - process: obs.exe
    require_all: false
    mode: suggest

  on_activate:
    script: null
  on_deactivate:
    script: null

  elevated_processes:
    - name: obs64.exe
      cpu_priority: high
      io_priority: high
      memory_priority: high
      cpu_affinity: null
      disable_power_throttling: true

    - name: obs.exe
      cpu_priority: high
      io_priority: high
      memory_priority: high
      cpu_affinity: null
      disable_power_throttling: true

    - name: chrome.exe
      cpu_priority: above_normal
      io_priority: high
      memory_priority: normal
      cpu_affinity: null
      disable_power_throttling: true

  throttled_processes:
    - name: OneDrive.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

    - name: SearchIndexer.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

    - name: MsMpEng.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

    - name: Teams.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

  network_qos:
    - app: obs64.exe
      priority: critical
      dscp: 46
    - app: obs.exe
      priority: critical
      dscp: 46
    - app: chrome.exe
      priority: high
      dscp: 34
    - app: OneDrive.exe
      priority: background
      dscp: 8

  watchdog:
    - process: obs64.exe
      restart_on_crash: true
      restart_delay_sec: 3
      max_restarts: 3
      backoff: fixed
      pre_restart_script: null
      post_restart_script: null
    - process: obs.exe
      restart_on_crash: true
      restart_delay_sec: 3
      max_restarts: 3
      backoff: fixed
      pre_restart_script: null
      post_restart_script: null

  memory:
    trim_background_working_sets: true
    trim_interval_min: 5
    low_memory_threshold_mb: 4096
    preflight_trim_on_activate: true

  system:
    purge_standby_memory: false
    standby_purge_interval_min: 15
    reenforce_priorities: true
    reenforce_interval_sec: 90
    pause_services:
      - WSearch
    disable_power_throttling: true
    flush_temp_on_activate: false
