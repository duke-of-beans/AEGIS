profile:
  name: build-mode
  display_name: "Build Mode"
  description: "Claude and VSCode get maximum CPU. Background sync paused."
  icon: build-mode
  color: "#22c55e"

  power_plan: high_performance

  auto_detect:
    triggers:
      - process: Code.exe
      - process: node.exe
    require_all: false
    mode: suggest

  on_activate:
    script: null
  on_deactivate:
    script: null

  elevated_processes:
    - name: Claude.exe
      cpu_priority: high
      io_priority: high
      memory_priority: high
      cpu_affinity: null
      disable_power_throttling: true

    - name: Code.exe
      cpu_priority: above_normal
      io_priority: high
      memory_priority: above_normal
      cpu_affinity: null
      disable_power_throttling: true

    - name: node.exe
      cpu_priority: above_normal
      io_priority: high
      memory_priority: normal
      cpu_affinity: null
      disable_power_throttling: true

  throttled_processes:
    - name: OneDrive.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

    - name: Teams.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: below_normal
      cpu_affinity: null
      disable_power_throttling: false

    - name: SearchIndexer.exe
      cpu_priority: idle
      io_priority: background
      memory_priority: idle
      cpu_affinity: null
      disable_power_throttling: false

  network_qos:
    - app: Claude.exe
      priority: critical
      dscp: 46
    - app: node.exe
      priority: high
      dscp: 34
    - app: OneDrive.exe
      priority: background
      dscp: 8

  watchdog:
    - process: node.exe
      restart_on_crash: true
      restart_delay_sec: 1
      max_restarts: 10
      backoff: fixed
      pre_restart_script: null
      post_restart_script: null

  memory:
    trim_background_working_sets: true
    trim_interval_min: 5
    low_memory_threshold_mb: 3072
    preflight_trim_on_activate: true

  system:
    purge_standby_memory: true
    standby_purge_interval_min: 10
    reenforce_priorities: true
    reenforce_interval_sec: 60
    pause_services:
      - WSearch
      - SysMain
    disable_power_throttling: true
    flush_temp_on_activate: false

  browser_suspension:
    enabled: true
    cdp_port: 9222
    inactivity_threshold_min: 15
    memory_pressure_threshold_mb: 2000
