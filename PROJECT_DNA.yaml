identity:
  name: AEGIS
  display_name: "AEGIS — Cognitive Resource OS"
  version: "4.0.0"
  path: D:\Dev\aegis
  github: https://github.com/duke-of-beans/AEGIS
  architecture: "Tauri 2 desktop app + Node.js sidecar + WebView cockpit"
  architecture_doc: D:\Dev\aegis\ARCHITECTURE.md
  purpose: >
    Windows cognitive resource OS. Monitors every hardware and software resource,
    builds behavioral fingerprints for every process, detects context, and
    allocates resources with surgical precision. Sniper, not spray.
  philosophy: >
    Nothing that is not understood gets touched.
    Nothing that is not mapped gets targeted.
    If it is not mapped, it gets mapped.
    Reasoning builds trust in a way conclusions do not.
  tagline: "What doesn't need to run, doesn't run. What needs resources, gets them."

architecture:
  app_shell: "src-tauri/ — Tauri 2 Rust binary (metrics, process control, tray, IPC)"
  sidecar: "sidecar/ — Node.js intelligence engine (catalog, context, sniper, learning)"
  cockpit: "ui/index.html — Task Manager-style WebView rendered by Tauri"
  build: "cargo tauri build (produces NSIS installer)"
  NOT:
    - "Node.js daemon"
    - "Browser page"
    - "HTA application"
    - "systray2"
    - "pkg-bundled executable"
    - "Express server"

current_state:
  version: "4.0.0"
  phase: "RUNTIME-01 → UI-01"
  health: "All code compiles. Tauri build succeeds. Runtime bugs identified."
  last_sprint: "AEGIS-MCP-02 (ecd5c38)"

five_intelligences:
  catalog: "SHIPPED — 210-process knowledge base, canActOn gate"
  baseline: "SHIPPED — Welford online variance, per-process per-context fingerprints"
  context: "SHIPPED — WinEvent foreground tracking, composable policies + overlays"
  sniper: "SHIPPED — 3 rules, blast radius multipliers, graduated actions"
  learning: "SHIPPED — outcome recording, sacred context weighting, confidence score, auto mode unlock"

safety_tiers:
  tier_1: "Silent — logged, always reversible"
  tier_2: "Toast with 10s undo"
  tier_3: "Always confirm red"
  tier_4: "Settings-locked admin"

key_decisions:
  - date: "2026-03-06"
    decision: "AEGIS is a Tauri 2 desktop app"
    rationale: "Native tray, native window, Rust metrics, no browser dependency"
  - date: "2026-03-23"
    decision: "Independent daemon via pm2 — NOT coupled to GregLite"
    rationale: "AEGIS monitors the system, not a window"
  - date: "2026-03-24"
    decision: "Profiles replaced with composable policies + overlays"
    rationale: "Static profiles cannot handle overlapping contexts"
  - date: "2026-03-24"
    decision: "Catalog ships first — prerequisite for all intelligence"
    rationale: "Sniper cannot shoot without target identification"
  - date: "2026-03-24"
    decision: "Statistics as action layer. Classifier as labeling layer only."
    rationale: "Explainability. You can audit a stddev deviation."
  - date: "2026-03-25"
    decision: "v2 Node.js daemon code DELETED. src-tauri + sidecar + ui only."
    rationale: "Prevent architectural confusion that caused the POLISH-01 disaster"

sprint_queue:
  - id: AEGIS-RUNTIME-01
    title: "Fix Runtime Issues (tray bounce, metrics zeros, perMachine installer)"
    priority: P1
    depends_on: null
  - id: AEGIS-UI-01
    title: "Command Surface Redesign"
    priority: P2
    depends_on: AEGIS-RUNTIME-01
