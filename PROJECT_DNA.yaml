identity:
  name: AEGIS
  display_name: "AEGIS — Cognitive Resource OS"
  version: "3.0.0-planning"
  path: D:\Projects\AEGIS
  github: https://github.com/duke-of-beans/AEGIS
  purpose: >
    Windows cognitive resource OS. Monitors every hardware and software resource,
    builds behavioral fingerprints for every process, detects context, and
    allocates resources with surgical precision. Sniper, not spray.
  philosophy: >
    Nothing that is not understood gets touched.
    Nothing that is not mapped gets targeted.
    If it is not mapped, it gets mapped.
    Reasoning builds trust in a way conclusions do not.
  tagline: "What doesn't need to run, doesn't run. What needs resources, gets them."

current_state:
  version: "2.1.0"
  phase: "v3.0 planning — sprint queue building"
  health: "TypeScript clean. Zero errors. ca936bc."
  last_sprint: AEGIS-BRAVE-03
  completion_v2: 92%
  completion_v3: 0%
  v3_prerequisite: AEGIS-CATALOG-01
  repo_path: D:\Projects\AEGIS

architecture:
  runtime: "Node.js daemon via pm2. Independent of GregLite."
  worker: "PowerShell 7 child process (scripts/aegis-worker.ps1) via stdio IPC"
  status_server: "Express on configurable port (default 7172)"
  command_surface: "HTML/JS served by status server — cockpit, not dashboard"
  mcp_server: "Stdio MCP (--mcp flag) + HTTP MCP (planned v3)"
  storage:
    config: "%APPDATA%\\AEGIS\\aegis-config.yaml"
    state: "%APPDATA%\\AEGIS\\state.json"
    catalog: "%APPDATA%\\AEGIS\\catalog.db (SQLite — v3)"
    baselines: "%APPDATA%\\AEGIS\\baselines.db (SQLite — v3)"
    sessions: "%APPDATA%\\AEGIS\\sessions.db (SQLite — v3)"

five_intelligences:
  catalog: "Process knowledge base — trust scoring, blast radius, unknown detection"
  baseline: "Per-process behavioral fingerprinting — deviation not absolutes"
  context: "WinEvent hook foreground tracking — named contexts, composable policies"
  sniper: "Rules engine — graduated throttle/suspend/kill with TESSRYX blast radius"
  learning: "SQLite outcome store — weighted feedback, confidence score, weight tuning"

safety_tiers:
  tier_1: "Silent — logged, always reversible (priority, trim, QoS, power plan)"
  tier_2: "Toast with 10s undo — service, startup, suspend, TRIM/defrag"
  tier_3: "Always confirm red — kill, adapter disable, firewall block, page file"
  tier_4: "Settings-locked admin — boot config, driver, hardware irreversible"

operating_modes:
  manual: "User picks policy stacks. Nothing automatic."
  suggest: "Context detected. Toast with reasoning. User approves or dismisses."
  auto: "Full autonomy. Confidence-gated. Action log shows every decision with reasoning."
  preflight: "Manual button. Audit vs best historical sessions. Propose + confirm."

boundaries:
  does:
    - Monitor all major hardware and software resources in a unified surface
    - Build behavioral baselines per process per context
    - Detect context from foreground window events
    - Apply composable policy stacks automatically or on suggestion
    - Run a sniper rules engine with blast radius awareness
    - Learn from weighted outcome feedback
    - Publish a rich MCP server for GREGORE and GregLite integration
    - Serve a command surface — every metric adjacent to its action
  does_not:
    - Replace antivirus or act as a security scanner
    - Touch processes it does not understand
    - Act without earning trust progressively
    - Ship Auto mode before confidence is earned

interfaces:
  - product: TESSRYX
    relationship: "Blast radius calculation before Tier 3 actions."
  - product: GREGORE
    relationship: "Receives intent signal. Pre-configures machine before sprint start."
  - product: GregLite
    relationship: "Queries AEGIS via MCP for machine state and resource pressure."
  - product: DAI/Thalamic
    relationship: "AEGIS nodes on client deployments feed anonymized behavioral corpus."
  - product: HIRM
    relationship: "Baseline deviation = threshold system. C_critical = cognitive load score."

key_decisions:
  - date: "2026-03-24"
    decision: "Profiles replaced with composable policies + overlays"
    rationale: "Static profiles cannot handle overlapping contexts"
  - date: "2026-03-24"
    decision: "Process catalog ships first. It is the prerequisite for everything."
    rationale: "Sniper cannot shoot without target identification"
  - date: "2026-03-24"
    decision: "Catalog = factual knowledge only. Behavioral baselines observed fresh."
    rationale: "Pre-seeded baselines would bias learning"
  - date: "2026-03-24"
    decision: "Statistics as action layer. Classifier as labeling layer only."
    rationale: "Explainability. You can audit a stddev deviation."
  - date: "2026-03-24"
    decision: "Action log is the centerpiece of the command surface."
    rationale: "Reasoning builds trust in a way conclusions do not."
  - date: "2026-03-24"
    decision: "Cognitive load score ships with equal weights, weights are learned."
    rationale: "Cannot know correct weights before observing feedback correlation."
  - date: "2026-03-24"
    decision: "SQLite for all persistent intelligence storage."
    rationale: "Schema-first. Queryable. Exportable. Correct data volume."
  - date: "2026-03-23"
    decision: "AEGIS is an independent daemon. pm2 lifecycle. Not coupled to GregLite."
    rationale: "AEGIS monitors the system, not a window."

